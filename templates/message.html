<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page">
    <div class="container">

        <section class="message-card">

            <div class="message-icon">
                {% if type == "success" %}
                    ✅
                {% elif type == "error" %}
                    ❌
                {% elif type == "warning" %}
                    ⚠️
                {% else %}
                    🏀
                {% endif %}
            </div>

            <h1>{{ title }}</h1>
            <p class="message-text">{{ message }}</p>

            <div class="message-actions">
                <a href="{{ url_for('index') }}" class="action-btn blue-btn">
                    На главную
                </a>
                <button type="button" class="action-btn dark-btn" onclick="history.back()">
                    Назад
                </button>
            </div>

        </section>

    </div>
</div>

</body>
</html>
