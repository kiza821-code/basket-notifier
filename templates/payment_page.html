<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ payment_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='17') }}">
</head>
<body>

<div class="page">
    <div class="container">
        <section class="training-card payment-card-app">
            <div class="payment-icon-app">💳</div>

            <h1 class="payment-title-app">{{ payment_title }}</h1>

            <p class="payment-text-app">{{ payment_text | safe }}</p>

            {% if payment_phone %}
            <div class="payment-panel">
                <div class="payment-panel-label">Номер для перевода</div>

                <div class="payment-phone-row-app">
                    <div class="payment-phone-value-app" id="paymentPhone">{{ payment_phone }}</div>
                    <button type="button" class="payment-copy-btn" onclick="copyPaymentPhone()">
                        Скопировать номер
                    </button>
                </div>

                <div class="copy-status-app" id="copyStatus"></div>
            </div>
            {% endif %}


            <div class="payment-actions-app">
                <a href="{{ payment_link }}" class="payment-btn-app payment-btn-app-primary" target="_blank" rel="noopener noreferrer">
                    Оплата через Сбер
                </a>

                <form method="POST"
                      action="{{ url_for('confirm_payment', weekday_key=payment_day_key) }}"
                      onsubmit="return confirm('Подтвердить, что вы оплатили тренировку?');">
                    <button type="submit" class="payment-btn-app payment-btn-app-success">
                        Оплатил
                    </button>
                </form>


            </div>
        </section>
    </div>
</div>

<script>
function copyPaymentPhone() {
    const phone = document.getElementById("paymentPhone")?.innerText || "";
    const status = document.getElementById("copyStatus");

    if (!phone) return;

    navigator.clipboard.writeText(phone)
        .then(() => {
            if (status) status.textContent = "Номер скопирован";
        })
        .catch(() => {
            if (status) status.textContent = "Не удалось скопировать номер";
        });
}
</script>
{% include "_bottom_nav.html" %}
</body>
</html>
