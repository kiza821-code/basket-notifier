<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ payment_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .payment-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .payment-card {
            width: 100%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
            padding: 32px 28px;
            text-align: center;
        }

        .payment-icon {
            font-size: 54px;
            margin-bottom: 14px;
        }

        .payment-title {
            margin: 0 0 14px;
            font-size: 40px;
            line-height: 1.1;
            font-weight: 800;
            color: #0b1635;
        }

        .payment-text {
            margin: 0 auto 26px;
            max-width: 500px;
            font-size: 22px;
            line-height: 1.5;
            color: #31456b;
        }

        .payment-link-box {
            background: #f3f7ff;
            border: 1px solid #d9e4ff;
            border-radius: 18px;
            padding: 18px 16px;
            margin-bottom: 24px;
        }

        .payment-link-label {
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
            color: #5870a3;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .payment-link-value {
            font-size: 15px;
            line-height: 1.5;
            color: #1f3561;
            word-break: break-all;
        }

        .payment-actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .payment-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 0 20px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .payment-btn:hover {
            transform: translateY(-1px);
            opacity: 0.96;
        }

        .payment-btn-primary {
            background: #2f67e8;
            color: white;
        }

        .payment-btn-secondary {
            background: #0b1635;
            color: white;
        }

        .payment-btn-success {
            background: #21a866;
            color: white;
            width: 100%;
        }

        .payment-actions form {
            width: 100%;
        }

        .payment-phone-box {
            background: #f8fbff;
            border: 1px solid #d9e4ff;
            border-radius: 18px;
            padding: 18px 16px;
            margin-bottom: 20px;
        }

        .payment-phone-label {
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
            color: #5870a3;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .payment-phone-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .payment-phone-value {
            font-size: 22px;
            font-weight: 800;
            color: #0b1635;
            word-break: break-word;
        }

        .copy-btn {
            min-height: 44px;
            padding: 0 16px;
            border: none;
            border-radius: 14px;
            background: #e8f0ff;
            color: #1f3561;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .copy-btn:hover {
            opacity: 0.95;
        }

        .payment-qr-box {
            background: #ffffff;
            border: 1px solid #d9e4ff;
            border-radius: 18px;
            padding: 18px 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .payment-qr-label {
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 700;
            color: #5870a3;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .payment-qr-image {
            width: 220px;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            background: #fff;
            padding: 8px;
        }

        .copy-status {
            margin-top: 10px;
            font-size: 14px;
            color: #21a866;
            min-height: 20px;
        }

        .payment-actions form {
            width: 100%;
        }

        .payment-btn-success {
            background: #21a866;
            color: white;
            width: 100%;
        }

        @media (max-width: 640px) {
            .payment-card {
                padding: 24px 18px;
                border-radius: 22px;
            }

            .payment-title {
                font-size: 30px;
            }

            .payment-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="payment-page">
    <div class="payment-card">
        <div class="payment-icon">💳</div>

        <h1 class="payment-title">{{ payment_title }}</h1>

        <p class="payment-text">{{ payment_text | safe }}</p>

        {% if payment_phone %}
        <div class="payment-phone-box">
            <div class="payment-phone-label">Номер для перевода</div>

            <div class="payment-phone-row">
                <div class="payment-phone-value" id="paymentPhone">{{ payment_phone }}</div>
                <button type="button" class="copy-btn" onclick="copyPaymentPhone()">
                    Скопировать номер
                </button>
            </div>

            <div class="copy-status" id="copyStatus"></div>
        </div>
        {% endif %}


        <div class="payment-actions">
            <a href="{{ payment_link }}" class="payment-btn payment-btn-primary" target="_blank" rel="noopener noreferrer">
                Оплата через Сбер
            </a>

            <form method="POST"
                  action="{{ url_for('confirm_payment', weekday_key=payment_day_key) }}"
                  onsubmit="return confirm('Подтвердить, что вы оплатили тренировку?');">
                <button type="submit" class="payment-btn payment-btn-success">
                    Оплатил
                </button>
            </form>

            <a href="{{ url_for('index') }}" class="payment-btn payment-btn-secondary">
                Назад на главную
            </a>
        </div>
    </div>
</div>

<script>
function copyPaymentPhone() {
    const phone = document.getElementById("paymentPhone")?.innerText || "";
    const status = document.getElementById("copyStatus");

    if (!phone) return;

    navigator.clipboard.writeText(phone)
        .then(() => {
            if (status) {
                status.textContent = "Номер скопирован";
            }
        })
        .catch(() => {
            if (status) {
                status.textContent = "Не удалось скопировать номер";
            }
        });
}
</script>
</body>
</html>
