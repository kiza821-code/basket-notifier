<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page">
    <div class="container">

        <section class="login-card">
            <h1>📝 Регистрация</h1>
            <p class="login-text">
                Заполните данные. После регистрации доступ должен одобрить администратор.
            </p>

            <form method="POST" action="{{ url_for('register_account') }}" class="login-form">
                <input type="text" name="display_name" placeholder="Ваше имя" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Пароль" required>
                <button type="submit">Отправить заявку</button>
            </form>

            <div class="login-footer">
                <span class="login-footer-text">Уже есть аккаунт?</span>
                <a href="{{ url_for('login') }}" class="action-btn dark-btn">
                    Войти
                </a>
            </div>
        </section>

    </div>
</div>

</body>
</html>
