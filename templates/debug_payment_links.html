<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест оплаты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .btn-tuesday {
            background: #4CAF50;
        }

        .btn-thursday {
            background: #2196F3;
        }

        .btn-back {
            background: #999;
        }

        .url {
            font-size: 12px;
            color: #555;
            margin-bottom: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Тест оплаты</h1>

    <p>Проверка страниц оплаты</p>

    <div class="url">{{ tuesday_url }}</div>
    <a href="{{ tuesday_url }}" class="btn btn-tuesday">
        Оплата (вторник)
    </a>

    <div class="url">{{ thursday_url }}</div>
    <a href="{{ thursday_url }}" class="btn btn-thursday">
        Оплата (четверг)
    </a>

    <a href="/" class="btn btn-back">
        Назад
    </a>
</div>

</body>
</html>
